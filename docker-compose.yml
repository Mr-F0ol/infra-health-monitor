services:
  monitor:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn monitor.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      MONITOR_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-monitor}:${POSTGRES_PASSWORD:-monitor}@db:5432/${POSTGRES_DB:-monitor}
      MONITOR_REDIS_URL: redis://:${REDIS_PASSWORD:-monitor}@redis:6379/0
      MONITOR_LOG_FORMAT: json
    env_file:
      - .env
    volumes:
      - ./services.yaml:/app/services.yaml:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      POSTGRES_DB: ${POSTGRES_DB:-monitor}
    # No host port: the database is reached only over the internal compose
    # network by the monitor service. Debug with `docker compose exec db psql`.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    # Require a password and keep Redis off the host network — it holds alert
    # state and must not be reachable unauthenticated.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-monitor}"]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-monitor}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      monitor:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana_data:
