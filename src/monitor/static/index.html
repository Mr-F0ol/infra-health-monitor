<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infra Health Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #263548;
      --border:   #334155;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --blue:     #3b82f6;
      --up:       #22c55e;
      --up-bg:    #052e16;
      --down:     #ef4444;
      --down-bg:  #450a0a;
      --deg:      #f97316;
      --deg-bg:   #431407;
      --warn:     #f59e0b;
      --unk:      #64748b;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 60% 0%, rgba(59,130,246,.05) 0%, transparent 55%);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(15,23,42,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(51,65,85,.6);
      padding: 0 2rem;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(59,130,246,.35) 50%, transparent 100%);
      pointer-events: none;
    }
    .logo {
      font-weight: 700; font-size: 15px; letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-text { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 2px; }
    .logo span { color: var(--blue); }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--up); border-radius: 50%;
      box-shadow: 0 0 6px var(--up);
      animation: live-pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--up); }
      50%       { opacity: 0.5; box-shadow: 0 0 16px var(--up), 0 0 24px var(--up); }
    }

    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-time  { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; padding: 3px 12px;
      font-size: 12px; color: var(--muted);
    }

    .btn-icon {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px;
      width: 32px; height: 32px;
      font-size: 15px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s;
    }
    .btn-icon:hover { color: var(--text); background: var(--surface2); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin .6s linear infinite; }

    /* ── Status bar ──────────────────────────────────────────────── */
    .status-bar {
      padding: 8px 2rem; font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      transition: background .4s, color .4s;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .status-bar.all-good { background: rgba(34,197,94,.07);  color: var(--up);   border-bottom: 1px solid rgba(34,197,94,.15); }
    .status-bar.has-down { background: rgba(239,68,68,.07);  color: var(--down); border-bottom: 1px solid rgba(239,68,68,.15); }
    .status-bar.has-deg  { background: rgba(249,115,22,.07); color: var(--deg);  border-bottom: 1px solid rgba(249,115,22,.15); }
    .status-bar.has-unk  { background: rgba(100,116,139,.05);color: var(--unk);  border-bottom: 1px solid var(--border); }
    #status-uptime { margin-left: auto; font-size: 12px; opacity: .7; }

    /* ── Main ────────────────────────────────────────────────────── */
    main { max-width: 1280px; margin: 0 auto; padding: 2rem; }

    /* ── Summary stat cards ─────────────────────────────────────── */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px; margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      transition: border-color .15s;
    }
    .stat-card:hover { border-color: var(--blue); }
    .stat-val { font-size: 1.9rem; font-weight: 700; line-height: 1; }
    .stat-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-top: 5px; }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 320px; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%; padding: 7px 10px 7px 34px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    #search:focus { border-color: var(--blue); }
    #search::placeholder { color: var(--unk); }

    .filter-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-pill {
      font-size: 12px; font-weight: 500; padding: 5px 13px;
      border-radius: 99px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .filter-pill:hover { color: var(--text); background: var(--surface2); }
    .filter-pill.active                      { background: var(--blue); color: #fff; border-color: var(--blue); }
    .filter-pill[data-filter="up"].active    { background: var(--up);   color: #fff; border-color: var(--up);   }
    .filter-pill[data-filter="down"].active  { background: var(--down); color: #fff; border-color: var(--down); }
    .filter-pill[data-filter="degraded"].active { background: var(--deg);  color: #fff; border-color: var(--deg); }

    .sort-select {
      padding: 6px 10px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-family: inherit;
      cursor: pointer; outline: none; margin-left: auto;
    }
    .sort-select:focus { border-color: var(--blue); }

    /* ── Grid ────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1rem;
    }

    /* ── Skeleton ────────────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    .skeleton-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem 1.25rem;
      display: flex; flex-direction: column; gap: 13px;
    }
    .sk-line { height: 13px; }

    /* ── Card ────────────────────────────────────────────────────── */
    @keyframes card-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .15s, box-shadow .15s;
      display: flex; flex-direction: column; gap: 10px;
      position: relative;
      animation: card-in .22s ease both;
    }
    .card:hover {
      background: var(--surface2);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(0,0,0,.4);
    }
    .card.active { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }

    .card[data-status="up"]       { border-left: 3px solid var(--up); }
    .card[data-status="down"]     { border-left: 3px solid var(--down); background: rgba(239,68,68,.03); }
    .card[data-status="degraded"] { border-left: 3px solid var(--deg); }
    .card[data-status="unknown"]  { border-left: 3px solid var(--unk); }

    .card[data-status="down"]:not(:hover) { box-shadow: -2px 0 14px rgba(239,68,68,.12); }

    .card-top { display: flex; align-items: center; justify-content: space-between; }
    .card-name-row { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .svc-icon { font-size: 15px; line-height: 1; flex-shrink: 0; }
    .card-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: 2px 8px; border-radius: 99px;
      flex-shrink: 0;
    }
    .badge-up       { background: var(--up-bg);   color: var(--up); }
    .badge-down     { background: var(--down-bg);  color: var(--down); }
    .badge-degraded { background: var(--deg-bg);   color: var(--deg); }
    .badge-unknown  { background: var(--surface2); color: var(--unk); border: 1px solid var(--border); }

    .card-target { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip {
      display: inline-block; font-size: 10px;
      background: var(--bg); color: var(--muted);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 6px; margin-right: 4px;
    }

    .sparkline-wrap { height: 34px; display: flex; align-items: center; }
    .spark-empty { font-size: 11px; color: var(--unk); }

    .card-mid { display: flex; align-items: flex-end; justify-content: space-between; }
    .latency { font-size: 22px; font-weight: 700; }
    .latency-unit { font-size: 12px; color: var(--muted); }
    .latency-null { font-size: 14px; color: var(--muted); }
    .card-time { font-size: 11px; color: var(--muted); text-align: right; line-height: 1.8; }

    .card-stats {
      display: none; font-size: 11px; color: var(--muted);
      gap: 12px; padding-top: 2px;
    }
    .card:hover .card-stats { display: flex; }
    .stat-seg { display: flex; gap: 4px; align-items: center; }
    .stat-seg b { color: var(--text); }

    .uptime-bar-wrap  { display: flex; align-items: center; gap: 8px; }
    .uptime-bar-track { flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .uptime-bar-fill  { height: 100%; border-radius: 2px; transition: width .5s ease; }
    .uptime-label     { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .card-actions { display: flex; gap: 6px; }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; align-items: center;
      padding: 4rem 2rem; color: var(--muted); text-align: center;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-title { font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 4px; }
    .empty-desc  { font-size: 13px; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    button {
      font-family: inherit; font-size: 12px; font-weight: 500;
      border-radius: 6px; border: 1px solid var(--border);
      padding: 5px 12px; cursor: pointer;
      transition: background .12s, color .12s, opacity .12s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-primary { background: var(--blue); color: #fff; border-color: transparent; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-close {
      background: transparent; color: var(--muted);
      border: none; font-size: 18px; padding: 4px 8px;
      line-height: 1; border-radius: 6px; cursor: pointer;
    }
    .btn-close:hover { background: var(--surface2); color: var(--text); }

    /* ── Sidebar backdrop ────────────────────────────────────────── */
    .sidebar-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55); backdrop-filter: blur(3px);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 540px; max-width: 95vw;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 50; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .26s cubic-bezier(.4,0,.2,1);
      box-shadow: -12px 0 48px rgba(0,0,0,.5);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 12px;
    }
    .sidebar-title-block { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .sidebar-icon-wrap {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .sidebar-name   { font-weight: 600; font-size: 15px; }
    .sidebar-target {
      font-size: 11px; color: var(--muted); margin-top: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 320px;
    }
    .sidebar-head-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* service meta bar */
    .svc-meta {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .svc-meta-item {
      flex: 1; padding: 10px 16px;
      border-right: 1px solid var(--border);
    }
    .svc-meta-item:last-child { border-right: none; }
    .svc-meta-label {
      color: var(--muted); font-size: 10px;
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px;
    }
    .svc-meta-val { font-weight: 600; font-size: 13px; }

    .sidebar-body { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; }

    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: .75rem;
    }

    .chart-wrap {
      position: relative; height: 200px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem;
      margin-bottom: 1.5rem;
    }

    /* ── Table ───────────────────────────────────────────────────── */
    .table-wrap { border-radius: 8px; border: 1px solid var(--border); overflow: hidden; max-height: 340px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      position: sticky; top: 0; text-align: left;
      color: var(--muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: .05em; padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      font-weight: 500; background: var(--surface2);
    }
    td { padding: 9px 12px; border-bottom: 1px solid rgba(51,65,85,.5); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .empty { text-align: center; color: var(--muted); padding: 2.5rem; font-size: 13px; }

    .error-bar {
      background: var(--down-bg); border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem;
      color: #fca5a5; font-size: 13px; display: flex; align-items: center; gap: 8px;
    }

    /* ── Toasts ──────────────────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 100; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 16px; font-size: 13px;
      min-width: 240px; max-width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      transform: translateX(calc(100% + 24px)); opacity: 0;
      transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s;
      pointer-events: auto; display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateX(0); opacity: 1; }
    .toast-success { border-left: 3px solid var(--up); }
    .toast-error   { border-left: 3px solid var(--down); }
    .toast-info    { border-left: 3px solid var(--blue); }

    /* ── Misc ────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 0 1rem; }
      main   { padding: 1.25rem 1rem; }
      .header-time { display: none; }
      .sidebar { width: 100%; max-width: 100%; border-left: none; border-top: 1px solid var(--border); }
      .summary { grid-template-columns: repeat(3, 1fr); }
      .toolbar { gap: 8px; }
      .sort-select { margin-left: 0; width: 100%; }
      .search-wrap { max-width: 100%; }
      .svc-meta { flex-wrap: wrap; }
      .svc-meta-item { min-width: 50%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="live-dot"></div>
    Infra <span>Health</span> Monitor
  </div>
  <div class="header-right">
    <span id="last-updated" class="header-time"></span>
    <button class="btn-icon" id="btn-refresh" title="Refresh now">↻</button>
    <span class="pill">↻ <span id="countdown">30</span>s</span>
  </div>
</header>

<div id="status-bar" class="status-bar has-unk">
  <div class="status-dot"></div>
  <span id="status-text">Loading…</span>
  <span id="status-uptime"></span>
</div>

<main>
  <div id="error-bar" class="error-bar" hidden></div>

  <div id="summary" class="summary"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="Filter services…" autocomplete="off">
    </div>
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="up">Up</button>
      <button class="filter-pill" data-filter="down">Down</button>
      <button class="filter-pill" data-filter="degraded">Degraded</button>
    </div>
    <select id="sort-select" class="sort-select">
      <option value="status">Sort: Status</option>
      <option value="name">Sort: Name</option>
      <option value="latency">Sort: Latency</option>
    </select>
  </div>

  <div id="grid" class="grid"></div>
</main>

<div id="sidebar-backdrop" class="sidebar-backdrop"></div>
<aside id="sidebar" class="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-title-block">
      <div class="sidebar-icon-wrap"><span id="sidebar-icon"></span></div>
      <div style="min-width:0">
        <div class="sidebar-name" id="sidebar-svc-name"></div>
        <div class="sidebar-target" id="sidebar-svc-target"></div>
      </div>
    </div>
    <div class="sidebar-head-right">
      <span id="sidebar-badge"></span>
      <button class="btn-close" id="btn-close-sidebar">✕</button>
    </div>
  </div>

  <div class="svc-meta" id="svc-meta"></div>

  <div class="sidebar-body">
    <div class="section-label">Latency — last 50 checks</div>
    <div class="chart-wrap"><canvas id="latency-chart"></canvas></div>
    <div class="section-label">Check History</div>
    <div id="sidebar-content"></div>
  </div>
</aside>

<div id="toast-container"></div>

<script>
  let services     = [];
  let historyCache = {};
  let selected     = null;
  let countdown    = 30;
  let timer        = null;
  let chart        = null;
  let loaded       = false;
  let activeFilter = 'all';
  let activeSort   = 'status';

  const TYPE_ICON = { http: '🌐', tcp: '🔌', system: '💻' };

  // ── Wiring ──────────────────────────────────────────────────────────────────
  document.getElementById('btn-close-sidebar').addEventListener('click', closeSidebar);
  document.getElementById('sidebar-backdrop').addEventListener('click', closeSidebar);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && selected) closeSidebar(); });

  document.getElementById('btn-refresh').addEventListener('click', async () => {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('spinning');
    await loadServices();
    btn.classList.remove('spinning');
    resetTimer();
  });

  document.getElementById('search').addEventListener('input', renderGrid);

  document.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeFilter = pill.dataset.filter;
      renderGrid();
    });
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    activeSort = e.target.value;
    renderGrid();
  });

  // ── API ──────────────────────────────────────────────────────────────────────
  async function api(path, opts) {
    const res = await fetch(path, opts);
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    return res.json();
  }

  // ── Filter + Sort ────────────────────────────────────────────────────────────
  function getFilteredSorted() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    let list = services.filter(s => {
      if (activeFilter !== 'all' && s.status !== activeFilter) return false;
      if (q && !s.name.toLowerCase().includes(q) && !s.target.toLowerCase().includes(q)) return false;
      return true;
    });
    if (activeSort === 'status') {
      const order = { down: 0, degraded: 1, unknown: 2, up: 3 };
      list.sort((a, b) => (order[a.status] ?? 4) - (order[b.status] ?? 4));
    } else if (activeSort === 'latency') {
      list.sort((a, b) => (a.latency_ms ?? Infinity) - (b.latency_ms ?? Infinity));
    } else {
      list.sort((a, b) => a.name.localeCompare(b.name));
    }
    return list;
  }

  // ── Services ─────────────────────────────────────────────────────────────────
  async function loadServices() {
    try {
      services = await api('/services');
      loaded   = true;
      renderSummary();
      renderStatusBar();
      renderGrid();
      updateFavicon(services.some(s => s.status === 'down'));
      hideError();
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
      loadAllHistory();
    } catch (e) {
      loaded = true;
      showError('Cannot reach API — ' + e.message);
      renderGrid();
    }
  }

  async function loadAllHistory() {
    await Promise.allSettled(services.map(async svc => {
      try {
        historyCache[svc.name] = await api(
          '/history?service=' + encodeURIComponent(svc.name) + '&limit=50'
        );
      } catch {
        historyCache[svc.name] = [];
      }
    }));
    renderGrid();
    renderStatusUptime();
  }

  // ── Summary ──────────────────────────────────────────────────────────────────
  function renderSummary() {
    const c = counts();
    document.getElementById('summary').innerHTML = `
      <div class="stat-card">
        <div class="stat-val">${services.length}</div>
        <div class="stat-lbl">Services</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--up)">${c.up}</div>
        <div class="stat-lbl">Up</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--down)">${c.down}</div>
        <div class="stat-lbl">Down</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--deg)">${c.degraded}</div>
        <div class="stat-lbl">Degraded</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--unk)">${c.unknown}</div>
        <div class="stat-lbl">Unknown</div>
      </div>`;
  }

  function renderStatusBar() {
    const bar = document.getElementById('status-bar');
    const txt = document.getElementById('status-text');
    const c   = counts();
    bar.className = 'status-bar';
    if (!services.length) {
      bar.classList.add('has-unk'); txt.textContent = 'No services configured';
    } else if (c.down > 0) {
      bar.classList.add('has-down');
      txt.textContent = c.down === 1 ? '1 service is down' : `${c.down} services are down`;
    } else if (c.degraded > 0) {
      bar.classList.add('has-deg');
      txt.textContent = c.degraded === 1 ? '1 service is degraded' : `${c.degraded} services are degraded`;
    } else if (c.up === 0) {
      bar.classList.add('has-unk'); txt.textContent = 'Waiting for first check…';
    } else {
      bar.classList.add('all-good'); txt.textContent = 'All systems operational';
    }
  }

  function renderStatusUptime() {
    const allRows = Object.values(historyCache).flat();
    if (!allRows.length) return;
    const upCount = allRows.filter(r => r.status === 'up').length;
    const pct     = ((upCount / allRows.length) * 100).toFixed(1);
    document.getElementById('status-uptime').textContent = `Overall uptime ${pct}%`;
  }

  function counts() {
    const c = { up: 0, down: 0, degraded: 0, unknown: 0 };
    services.forEach(s => { c[s.status] = (c[s.status] || 0) + 1; });
    return c;
  }

  // ── Skeleton ─────────────────────────────────────────────────────────────────
  function skeletonCard() {
    return `<div class="skeleton-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="skeleton sk-line" style="width:55%"></div>
        <div class="skeleton sk-line" style="width:18%;height:18px;border-radius:99px"></div>
      </div>
      <div class="skeleton sk-line" style="width:70%"></div>
      <div class="skeleton" style="height:34px;border-radius:4px"></div>
      <div style="display:flex;justify-content:space-between">
        <div class="skeleton sk-line" style="width:28%"></div>
        <div class="skeleton sk-line" style="width:22%"></div>
      </div>
      <div class="skeleton sk-line" style="width:100%;height:3px"></div>
      <div style="display:flex;gap:6px">
        <div class="skeleton" style="width:36%;height:28px;border-radius:6px"></div>
        <div class="skeleton" style="width:28%;height:28px;border-radius:6px"></div>
      </div>
    </div>`;
  }

  // ── Grid ─────────────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('grid');

    if (!loaded) {
      grid.innerHTML = Array.from({ length: 6 }).map(skeletonCard).join('');
      return;
    }

    const list = getFilteredSorted();

    if (!services.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📡</div>
        <div class="empty-title">No services configured</div>
        <div class="empty-desc">Add services to <code>services.yaml</code> to start monitoring.</div>
      </div>`;
      return;
    }

    if (!list.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No services match</div>
        <div class="empty-desc">Try a different filter or search term.</div>
      </div>`;
      return;
    }

    grid.innerHTML = list.map((s, i) => {
      const rows   = historyCache[s.name];
      const lat    = s.latency_ms != null
        ? `<span class="latency" style="color:${latColor(s.latency_ms)}">${Math.round(s.latency_ms)}<span class="latency-unit">ms</span></span>`
        : `<span class="latency-null">—</span>`;
      const ago    = s.last_checked ? timeAgo(s.last_checked) : 'never';
      const spark  = rows ? sparkline(rows) : '<span class="spark-empty">loading…</span>';
      const uptime = rows ? calcUptime(rows) : null;
      const stats  = rows ? calcStats(rows)  : null;

      const uptimeBar = uptime ? `
        <div class="uptime-bar-wrap">
          <div class="uptime-bar-track">
            <div class="uptime-bar-fill" style="width:${uptime};background:${uptimeColor(uptime)}"></div>
          </div>
          <span class="uptime-label">${uptime} uptime</span>
        </div>` : '';

      const statsRow = stats ? `
        <div class="card-stats">
          <div class="stat-seg">min <b style="color:var(--up)">${stats.min}ms</b></div>
          <div class="stat-seg">avg <b>${stats.avg}ms</b></div>
          <div class="stat-seg">max <b style="color:${latColor(stats.maxRaw)}">${stats.max}ms</b></div>
        </div>` : '';

      return `
        <div class="card ${selected === s.name ? 'active' : ''}"
             data-name="${esc(s.name)}" data-status="${s.status}"
             style="animation-delay:${(i * 0.04).toFixed(2)}s">
          <div class="card-top">
            <div class="card-name-row">
              <span class="svc-icon">${TYPE_ICON[s.type] || '📡'}</span>
              <span class="card-name ${s.status === 'down' ? 'pulse' : ''}">${esc(s.name)}</span>
            </div>
            <span class="badge badge-${s.status}">${s.status}</span>
          </div>
          <div class="card-target"><span class="chip">${s.type}</span>${esc(s.target)}${s.port ? ':' + s.port : ''}</div>
          <div class="sparkline-wrap">${spark}</div>
          <div class="card-mid">
            ${lat}
            <div class="card-time">${ago}<br><span style="font-size:10px">every ${s.interval}s</span></div>
          </div>
          ${statsRow}
          ${uptimeBar}
          <div class="card-actions">
            <button class="btn-primary btn-check">Check now</button>
            <button class="btn-ghost btn-history">History</button>
          </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('.card').forEach(card => {
      const name = card.dataset.name;
      const svc  = services.find(s => s.name === name);
      card.addEventListener('click', () => selectSvc(name));
      card.querySelector('.btn-check').addEventListener('click', e => { e.stopPropagation(); runCheck(svc); });
      card.querySelector('.btn-history').addEventListener('click', e => { e.stopPropagation(); selectSvc(name); });
    });
  }

  // ── Sparkline ────────────────────────────────────────────────────────────────
  function sparkline(rows) {
    const pts = [...rows].slice(0, 10).reverse().map(r => r.latency_ms).filter(v => v != null);
    if (pts.length < 2) return '<span class="spark-empty">no data yet</span>';
    const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 1;
    const W = 100, H = 32, P = 3;
    const coords = pts.map((v, i) => {
      const x = P + (i / (pts.length - 1)) * (W - 2 * P);
      const y = H - P - ((v - mn) / rng) * (H - 2 * P);
      return [x.toFixed(1), y.toFixed(1)];
    });
    const line  = coords.map(([x, y]) => `${x},${y}`).join(' ');
    const fill  = [`${P},${H}`, ...coords.map(([x, y]) => `${x},${y}`), `${W - P},${H}`].join(' ');
    const color = latColor(pts[pts.length - 1]);
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">
      <polygon points="${fill}" fill="${color}" opacity="0.1"/>
      <polyline points="${line}" fill="none" stroke="${color}" stroke-width="1.8"
        stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  }

  // ── Stats helpers ─────────────────────────────────────────────────────────────
  function calcUptime(rows) {
    if (!rows.length) return null;
    const up = rows.filter(r => r.status === 'up').length;
    return ((up / rows.length) * 100).toFixed(1) + '%';
  }

  function calcStats(rows) {
    const vals = rows.map(r => r.latency_ms).filter(v => v != null);
    if (!vals.length) return null;
    const mn  = Math.min(...vals), mx = Math.max(...vals);
    const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
    return { min: Math.round(mn), max: Math.round(mx), maxRaw: mx, avg: Math.round(avg) };
  }

  function latColor(ms) {
    if (ms == null) return 'var(--unk)';
    if (ms < 200)   return '#22c55e';
    if (ms < 1000)  return '#f59e0b';
    return '#ef4444';
  }

  function uptimeColor(pct) {
    const v = parseFloat(pct);
    if (v >= 99) return 'var(--up)';
    if (v >= 90) return 'var(--warn)';
    return 'var(--down)';
  }

  // ── Favicon ───────────────────────────────────────────────────────────────────
  function updateFavicon(hasDown) {
    try {
      const c = document.createElement('canvas');
      c.width = 32; c.height = 32;
      const ctx = c.getContext('2d');
      ctx.beginPath();
      ctx.arc(16, 16, 15, 0, Math.PI * 2);
      ctx.fillStyle = hasDown ? '#450a0a' : '#052e16';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(16, 16, 14, 0, Math.PI * 2);
      ctx.strokeStyle = hasDown ? '#ef4444' : '#22c55e';
      ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = hasDown ? '#ef4444' : '#22c55e';
      ctx.font = 'bold 17px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(hasDown ? '!' : '✓', 16, 17);
      let link = document.querySelector("link[rel~='icon']");
      if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
      link.href = c.toDataURL();
    } catch { /* canvas blocked */ }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const wrap  = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = msg;
    wrap.appendChild(toast);
    requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 350);
    }, 3500);
  }

  // ── Manual check ──────────────────────────────────────────────────────────────
  async function runCheck(svc) {
    const card = document.querySelector(`.card[data-name="${svc.name}"]`);
    const btn  = card && card.querySelector('.btn-check');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Checking…'; }
    try {
      const body = { name: svc.name, type: svc.type, target: svc.target };
      if (svc.port) body.port = svc.port;
      const result = await api('/checks/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const latStr = result.latency_ms != null ? ` — ${Math.round(result.latency_ms)}ms` : '';
      showToast(
        `${svc.name} checked${latStr} · ${result.status.toUpperCase()}`,
        result.status === 'up' ? 'success' : result.status === 'down' ? 'error' : 'info'
      );
    } catch (e) {
      showError('Check failed: ' + e.message);
      showToast('Check failed: ' + e.message, 'error');
    } finally {
      await loadServices();
      if (selected === svc.name) await loadHistory(svc.name);
    }
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────────
  async function selectSvc(name) {
    selected = name;
    const svc = services.find(s => s.name === name);
    renderGrid();

    document.getElementById('sidebar-icon').textContent     = TYPE_ICON[svc?.type] || '📡';
    document.getElementById('sidebar-svc-name').textContent = name;
    document.getElementById('sidebar-svc-target').textContent =
      (svc?.target || '') + (svc?.port ? ':' + svc.port : '');
    document.getElementById('sidebar-badge').innerHTML =
      `<span class="badge badge-${svc?.status || 'unknown'}">${svc?.status || 'unknown'}</span>`;

    document.getElementById('svc-meta').innerHTML = `
      <div class="svc-meta-item">
        <div class="svc-meta-label">Type</div>
        <div class="svc-meta-val">${(svc?.type || '—').toUpperCase()}</div>
      </div>
      <div class="svc-meta-item">
        <div class="svc-meta-label">Interval</div>
        <div class="svc-meta-val">every ${svc?.interval || '—'}s</div>
      </div>
      <div class="svc-meta-item">
        <div class="svc-meta-label">Last check</div>
        <div class="svc-meta-val">${svc?.last_checked ? timeAgo(svc.last_checked) : 'never'}</div>
      </div>
      ${svc?.port ? `<div class="svc-meta-item"><div class="svc-meta-label">Port</div><div class="svc-meta-val">${svc.port}</div></div>` : ''}`;

    document.getElementById('sidebar-backdrop').classList.add('open');
    document.getElementById('sidebar').classList.add('open');
    document.body.style.overflow = 'hidden';
    await loadHistory(name);
  }

  function closeSidebar() {
    selected = null;
    document.getElementById('sidebar-backdrop').classList.remove('open');
    document.getElementById('sidebar').classList.remove('open');
    document.body.style.overflow = '';
    destroyChart();
    renderGrid();
  }

  // ── History ───────────────────────────────────────────────────────────────────
  async function loadHistory(name) {
    const body = document.getElementById('sidebar-content');
    body.innerHTML = '<p class="empty">Loading…</p>';
    try {
      const rows = await api('/history?service=' + encodeURIComponent(name) + '&limit=50');
      historyCache[name] = rows;
      renderGrid();
      if (!rows.length) {
        destroyChart();
        body.innerHTML = '<p class="empty">No history yet — click "Check now" to run the first check.</p>';
        return;
      }
      renderChart(rows);
      renderTable(rows, body);
    } catch {
      body.innerHTML = '<p class="empty">Failed to load history.</p>';
    }
  }

  // ── Chart ─────────────────────────────────────────────────────────────────────
  function renderChart(rows) {
    const ordered = [...rows].reverse();
    const labels  = ordered.map(r => r.checked_at ? fmtShort(r.checked_at) : '');
    const data    = ordered.map(r => r.latency_ms ?? null);
    const colors  = ordered.map(r => latColor(r.latency_ms));

    destroyChart();
    const ctx = document.getElementById('latency-chart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Latency (ms)',
          data,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,0.06)',
          pointBackgroundColor: colors,
          pointBorderColor: colors,
          pointRadius: 4,
          pointHoverRadius: 7,
          borderWidth: 2,
          fill: true,
          tension: 0.35,
          spanGaps: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e293b',
            borderColor: '#334155',
            borderWidth: 1,
            titleColor: '#94a3b8',
            bodyColor: '#f1f5f9',
            padding: 10,
            callbacks: {
              label: ctx => ctx.parsed.y != null ? ctx.parsed.y.toFixed(1) + ' ms' : 'no data',
            },
          },
        },
        scales: {
          x: {
            ticks: { color: '#64748b', maxTicksLimit: 8, maxRotation: 0, font: { size: 11 } },
            grid:  { color: '#1e293b' },
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#64748b', callback: v => v + ' ms', font: { size: 11 } },
            grid:  { color: '#263548' },
          },
        },
      },
    });
  }

  function renderTable(rows, container) {
    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Time</th><th>Status</th><th>Latency</th><th>Detail</th></tr>
          </thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td style="color:var(--muted);white-space:nowrap;font-size:12px">${r.checked_at ? fmtFull(r.checked_at) : '—'}</td>
              <td><span class="badge badge-${r.status}">${r.status}</span></td>
              <td style="color:${latColor(r.latency_ms)};font-weight:600">${r.latency_ms != null ? r.latency_ms.toFixed(1) + ' ms' : '—'}</td>
              <td style="color:var(--muted);font-size:12px">${esc(r.detail || '—')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function destroyChart() { if (chart) { chart.destroy(); chart = null; } }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  // SQLite strips timezone — append Z so the browser treats the string as UTC
  function toDate(iso) {
    if (!iso) return null;
    return new Date(/[Zz]|[+-]\d{2}:\d{2}$/.test(iso) ? iso : iso + 'Z');
  }

  function timeAgo(iso) {
    const s = Math.floor((Date.now() - toDate(iso)) / 1000);
    if (s < 5)    return 'just now';
    if (s < 60)   return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    return Math.floor(s / 3600) + 'h ago';
  }

  function fmtShort(iso) {
    return toDate(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function fmtFull(iso) {
    const d = toDate(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showError(msg) {
    const el = document.getElementById('error-bar');
    el.innerHTML = '⚠ ' + esc(msg); el.hidden = false;
  }
  function hideError() { document.getElementById('error-bar').hidden = true; }

  // ── Auto-refresh ──────────────────────────────────────────────────────────────
  function resetTimer() {
    clearInterval(timer);
    countdown = 30;
    document.getElementById('countdown').textContent = countdown;
    timer = setInterval(async () => {
      countdown--;
      document.getElementById('countdown').textContent = countdown;
      if (countdown <= 0) {
        countdown = 30;
        await loadServices();
        if (selected) await loadHistory(selected);
      }
    }, 1000);
  }

  function startTimer() { resetTimer(); }

  renderGrid(); // show skeletons immediately
  loadServices();
  startTimer();
</script>
</body>
</html>
