<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Infra Health Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#07070b">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070b;
      --surface:   #101017;
      --surface2:  #181823;
      --border:    #29293a;
      --border-hi: #3a3a52;
      --text:      #e9e9f2;
      --muted:     #7d7d95;
      --accent:    #b46bff;
      --accent-hi: #c98bff;
      --accent-dim:#7c3aed;
      --glow:      rgba(180,107,255,.55);
      --up:        #2bd576;
      --up-bg:     #06291a;
      --down:      #ff4d5e;
      --down-bg:   #350a12;
      --deg:       #ffd60a;
      --deg-bg:    #2e2306;
      --warn:      #ffd60a;
      --unk:       #6b6b7c;
      --radius:    10px;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 50% -8%, rgba(180,107,255,.16) 0%, transparent 60%),
        radial-gradient(ellipse at 100% 100%, rgba(124,58,237,.08) 0%, transparent 45%),
        linear-gradient(rgba(180,107,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,107,255,.045) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    /* Faint CRT scanlines for the cyber feel */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom, rgba(255,255,255,.014) 0 1px, transparent 1px 3px);
      mix-blend-mode: overlay;
    }

    /* Keyboard focus ring */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(10,10,16,.82);
      backdrop-filter: blur(14px) saturate(1.2);
      border-bottom: 1px solid rgba(180,107,255,.18);
      padding: 0 1.75rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
      box-shadow: 0 0 12px var(--glow);
      pointer-events: none;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-weight: 700; font-size: 16px; letter-spacing: -.05em;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-dim), var(--accent));
      border: 1px solid var(--accent-hi);
      box-shadow: 0 0 0 1px rgba(180,107,255,.2), 0 0 20px var(--glow),
                  inset 0 0 14px rgba(255,255,255,.14);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }
    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-title {
      font-family: var(--mono); font-weight: 700; font-size: 15px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--text);
    }
    .logo-title span { color: var(--accent); text-shadow: 0 0 14px var(--glow); }
    .logo-sub {
      font-size: 9px; letter-spacing: .34em; text-transform: uppercase;
      color: var(--muted); margin-top: 4px;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--up); border-radius: 50%;
      box-shadow: 0 0 6px var(--up);
      animation: live-pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--up); }
      50%       { opacity: 0.5; box-shadow: 0 0 16px var(--up), 0 0 24px var(--up); }
    }

    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-time  { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* Refresh interval segmented control */
    .refresh-controls {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .refresh-btn {
      background: var(--surface);
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 9px;
      font-size: 11px; font-weight: 500; font-family: inherit;
      cursor: pointer;
      transition: background .15s, color .15s;
      line-height: 1;
    }
    .refresh-btn:last-child { border-right: none; }
    .refresh-btn:hover { background: var(--surface2); color: var(--text); }
    .refresh-btn { font-family: var(--mono); }
    .refresh-btn.active { background: var(--accent); color: #fff; box-shadow: inset 0 0 14px rgba(255,255,255,.18), 0 0 12px var(--glow); }

    .pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 12px;
      font-family: var(--mono);
      font-size: 11px; color: var(--muted); white-space: nowrap;
    }

    .btn-icon {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px;
      width: 32px; height: 32px;
      font-size: 15px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s;
    }
    .btn-icon:hover { color: var(--accent); background: var(--surface2); border-color: var(--accent); box-shadow: 0 0 12px rgba(180,107,255,.25); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin .6s linear infinite; }

    /* ── Status bar ──────────────────────────────────────────────── */
    .status-bar {
      padding: 9px 1.75rem; font-size: 12px; font-weight: 500;
      font-family: var(--mono); letter-spacing: .04em;
      display: flex; align-items: center; gap: 8px;
      transition: background .4s, color .4s;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }
    #status-uptime { font-family: var(--mono); }
    .status-bar.all-good { background: rgba(34,197,94,.07);  color: var(--up);   border-bottom: 1px solid rgba(34,197,94,.15); }
    .status-bar.has-down { background: rgba(239,68,68,.07);  color: var(--down); border-bottom: 1px solid rgba(239,68,68,.15); }
    .status-bar.has-deg  { background: rgba(250,204,21,.07); color: var(--deg);  border-bottom: 1px solid rgba(250,204,21,.18); }
    .status-bar.has-unk  { background: rgba(100,116,139,.05);color: var(--unk);  border-bottom: 1px solid var(--border); }
    #status-uptime { margin-left: auto; font-size: 12px; opacity: .7; }

    /* ── Main ────────────────────────────────────────────────────── */
    main { max-width: 1280px; margin: 0 auto; padding: 2rem; }

    /* ── Summary stat cards ─────────────────────────────────────── */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px; margin-bottom: 1.75rem;
    }
    .stat-card {
      background: linear-gradient(160deg, var(--surface), var(--surface2));
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.25rem;
      transition: border-color .15s, box-shadow .15s, transform .15s;
      position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: ''; position: absolute; top: 0; right: 0;
      border-width: 0 14px 14px 0; border-style: solid;
      border-color: transparent var(--border) transparent transparent;
    }
    .stat-card:hover {
      border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 0 22px rgba(180,107,255,.18);
    }
    .stat-card:hover::after { border-color: transparent var(--accent) transparent transparent; }
    .stat-val { font-family: var(--mono); font-size: 1.8rem; font-weight: 700; line-height: 1; }
    .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-top: 6px; }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: .75rem; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 320px; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%; padding: 7px 10px 7px 34px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 16px rgba(180,107,255,.2); }
    #search::placeholder { color: var(--unk); }

    .filter-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-pill {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .08em;
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .filter-pill:hover { color: var(--text); background: var(--surface2); border-color: var(--border-hi); }
    .filter-pill.active                         { background: var(--accent); color: #fff;     border-color: var(--accent); box-shadow: 0 0 14px var(--glow); }
    .filter-pill[data-filter="up"].active       { background: var(--up);   color: #04130b;  border-color: var(--up);   box-shadow: 0 0 14px rgba(43,213,118,.5); }
    .filter-pill[data-filter="down"].active     { background: var(--down); color: #fff;     border-color: var(--down); box-shadow: 0 0 14px rgba(255,77,94,.5); }
    .filter-pill[data-filter="degraded"].active { background: var(--deg);  color: #1a1400;  border-color: var(--deg);  box-shadow: 0 0 14px rgba(255,214,10,.45); }

    .sort-select {
      padding: 6px 10px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-family: inherit;
      cursor: pointer; outline: none; margin-left: auto;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* Results count */
    .results-count { font-size: 12px; color: var(--muted); margin-bottom: 1rem; min-height: 18px; }
    .results-count strong { color: var(--text); }

    /* ── Grid ────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1rem;
    }

    /* ── Skeleton ────────────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    .skeleton-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem 1.25rem;
      display: flex; flex-direction: column; gap: 13px;
    }
    .sk-line { height: 13px; }

    /* ── Card ────────────────────────────────────────────────────── */
    @keyframes card-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: linear-gradient(160deg, var(--surface), var(--surface2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      display: flex; flex-direction: column; gap: 10px;
      position: relative;
    }
    /* Cyber corner notch (top-right) */
    .card::after {
      content: ''; position: absolute; top: 0; right: 0;
      border-width: 0 15px 15px 0; border-style: solid;
      border-color: transparent var(--border) transparent transparent;
      transition: border-color .15s;
    }
    /* Animation only on first page load, not on every refresh */
    .card.is-new { animation: card-in .22s ease both; }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(0,0,0,.5), 0 0 22px rgba(180,107,255,.22);
    }
    .card:hover::after,
    .card.active::after { border-color: transparent var(--accent) transparent transparent; }
    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 26px rgba(180,107,255,.3); }

    .card[data-status="up"]       { border-left: 2px solid var(--up); }
    .card[data-status="down"]     { border-left: 2px solid var(--down); background: linear-gradient(160deg, rgba(255,77,94,.06), var(--surface2)); }
    .card[data-status="degraded"] { border-left: 2px solid var(--deg); }
    .card[data-status="unknown"]  { border-left: 2px solid var(--unk); }

    .card[data-status="down"]:not(:hover)     { box-shadow: inset 3px 0 18px rgba(255,77,94,.12); }
    .card[data-status="degraded"]:not(:hover) { box-shadow: inset 3px 0 16px rgba(255,214,10,.10); }

    .card-top { display: flex; align-items: center; justify-content: space-between; }
    .card-name-row { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .svc-icon { font-size: 15px; line-height: 1; flex-shrink: 0; }
    .card-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge {
      font-family: var(--mono);
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; padding: 3px 8px; border-radius: 4px;
      flex-shrink: 0; border: 1px solid transparent;
    }
    .badge-up       { background: var(--up-bg);   color: var(--up);   border-color: rgba(43,213,118,.35); text-shadow: 0 0 8px rgba(43,213,118,.6); }
    .badge-down     { background: var(--down-bg); color: var(--down); border-color: rgba(255,77,94,.4);  text-shadow: 0 0 8px rgba(255,77,94,.6); }
    .badge-degraded { background: var(--deg-bg);  color: var(--deg);  border-color: rgba(255,214,10,.4); text-shadow: 0 0 8px rgba(255,214,10,.5); }
    .badge-unknown  { background: var(--surface2); color: var(--unk); border-color: var(--border); }

    .card-target { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip {
      display: inline-block; font-family: var(--mono); font-size: 9px;
      text-transform: uppercase; letter-spacing: .08em;
      background: var(--bg); color: var(--muted);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 1px 6px; margin-right: 4px;
    }

    .sparkline-wrap { height: 34px; display: flex; align-items: center; }
    .spark-empty { font-size: 11px; color: var(--unk); }

    .card-mid { display: flex; align-items: flex-end; justify-content: space-between; }
    .latency { font-family: var(--mono); font-size: 23px; font-weight: 700; letter-spacing: -.02em; }
    .latency-unit { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: 1px; }
    .latency-null { font-size: 14px; color: var(--muted); }
    .card-time { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: right; line-height: 1.9; }

    .card-stats {
      display: none; font-family: var(--mono); font-size: 10px; color: var(--muted);
      gap: 12px; padding-top: 2px;
    }
    .card:hover .card-stats { display: flex; }
    .stat-seg { display: flex; gap: 4px; align-items: center; }
    .stat-seg b { color: var(--text); }

    /* ── Uptime blocks (StatusPage-style) ───────────────────────── */
    .uptime-blocks {
      display: flex; gap: 2px; height: 20px; align-items: stretch;
    }
    .uptime-block {
      flex: 1; border-radius: 2px; min-width: 0;
      transition: opacity .1s; cursor: default;
    }
    .uptime-block:hover { opacity: .65; }
    .uptime-label { font-size: 10px; color: var(--muted); white-space: nowrap; margin-top: 2px; }

    .card-actions { display: flex; gap: 6px; }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; align-items: center;
      padding: 4rem 2rem; color: var(--muted); text-align: center;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-title { font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 4px; }
    .empty-desc  { font-size: 13px; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    button {
      font-family: inherit; font-size: 12px; font-weight: 500;
      border-radius: 6px; border: 1px solid var(--border);
      padding: 5px 12px; cursor: pointer;
      transition: background .12s, color .12s, opacity .12s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-dim), var(--accent));
      color: #fff; border-color: var(--accent-hi);
      font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em;
      box-shadow: 0 0 14px rgba(180,107,255,.3);
    }
    .btn-primary:hover { background: linear-gradient(135deg, var(--accent), var(--accent-hi)); box-shadow: 0 0 20px var(--glow); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
    .btn-close {
      background: transparent; color: var(--muted);
      border: none; font-size: 18px; padding: 4px 8px;
      line-height: 1; border-radius: 6px; cursor: pointer;
    }
    .btn-close:hover { background: var(--surface2); color: var(--text); }

    /* ── Sidebar backdrop ────────────────────────────────────────── */
    .sidebar-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55); backdrop-filter: blur(3px);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 540px; max-width: 95vw;
      background: linear-gradient(180deg, var(--surface), #0b0b11);
      border-left: 1px solid var(--accent);
      z-index: 50; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .26s cubic-bezier(.4,0,.2,1);
      box-shadow: -12px 0 48px rgba(0,0,0,.5), -1px 0 28px rgba(180,107,255,.18);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 12px;
    }
    .sidebar-title-block { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .sidebar-icon-wrap {
      width: 40px; height: 40px; border-radius: 9px;
      background: var(--surface2); border: 1px solid var(--accent);
      box-shadow: 0 0 16px rgba(180,107,255,.25), inset 0 0 10px rgba(180,107,255,.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .sidebar-name   { font-weight: 600; font-size: 15px; }
    .sidebar-target {
      font-size: 11px; color: var(--muted); margin-top: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 320px;
    }
    .sidebar-head-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .svc-meta {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .svc-meta-item {
      flex: 1; padding: 10px 16px;
      border-right: 1px solid var(--border);
    }
    .svc-meta-item:last-child { border-right: none; }
    .svc-meta-label {
      color: var(--muted); font-size: 10px;
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px;
    }
    .svc-meta-val { font-weight: 600; font-size: 13px; }

    .sidebar-body { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; }

    .section-label {
      font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .14em; color: var(--muted); margin-bottom: .75rem;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::before {
      content: ''; width: 3px; height: 12px; border-radius: 1px;
      background: var(--accent); box-shadow: 0 0 8px var(--glow);
    }

    .chart-wrap {
      position: relative; height: 200px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem;
      margin-bottom: 1.5rem;
    }

    /* ── Table ───────────────────────────────────────────────────── */
    .table-wrap { border-radius: 8px; border: 1px solid var(--border); overflow: hidden; max-height: 340px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      position: sticky; top: 0; text-align: left;
      color: var(--muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: .05em; padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      font-weight: 500; background: var(--surface2);
    }
    td { padding: 9px 12px; border-bottom: 1px solid rgba(51,65,85,.5); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* Status-change marker in history table */
    .changed-tag {
      display: inline-block; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      padding: 1px 5px; border-radius: 3px; margin-left: 5px;
      background: rgba(168,85,247,.16); color: var(--accent);
      vertical-align: middle;
    }

    .empty { text-align: center; color: var(--muted); padding: 2.5rem; font-size: 13px; }

    .error-bar {
      background: var(--down-bg); border: 1px solid rgba(255,77,94,.35);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem;
      color: #ffb3ba; font-size: 13px; display: flex; align-items: center; gap: 8px;
    }
    /* The class sets display:flex, which would otherwise beat the [hidden]
       attribute in the cascade and keep an empty bar visible. */
    .error-bar[hidden] { display: none; }

    /* ── Toasts ──────────────────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 100; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 16px; font-size: 13px;
      min-width: 240px; max-width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      transform: translateX(calc(100% + 24px)); opacity: 0;
      transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s;
      pointer-events: auto; display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateX(0); opacity: 1; }
    .toast-success { border-left: 3px solid var(--up); }
    .toast-error   { border-left: 3px solid var(--down); }
    .toast-info    { border-left: 3px solid var(--accent); }

    /* ── Misc ────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 0 1rem; }
      main   { padding: 1.25rem 1rem; }
      .header-time, .refresh-controls { display: none; }
      .sidebar { width: 100%; max-width: 100%; border-left: none; border-top: 1px solid var(--border); }
      .summary { grid-template-columns: repeat(3, 1fr); }
      .toolbar { gap: 8px; }
      .sort-select { margin-left: 0; width: 100%; }
      .search-wrap { max-width: 100%; }
      .svc-meta { flex-wrap: wrap; }
      .svc-meta-item { min-width: 50%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark" aria-hidden="true">F0</div>
    <div class="logo-text">
      <span class="logo-title">INFRA<span>MONITOR</span></span>
      <span class="logo-sub">health grid</span>
    </div>
    <div class="live-dot" aria-hidden="true"></div>
  </div>
  <div class="header-right">
    <span id="last-updated" class="header-time"></span>
    <div class="refresh-controls" role="group" aria-label="Auto-refresh interval">
      <button class="refresh-btn" data-interval="15">15s</button>
      <button class="refresh-btn active" data-interval="30">30s</button>
      <button class="refresh-btn" data-interval="60">60s</button>
      <button class="refresh-btn" data-interval="0">⏸</button>
    </div>
    <button class="btn-icon" id="btn-refresh" aria-label="Refresh now (press R)">↻</button>
    <span class="pill" id="countdown-pill">↻ <span id="countdown">30</span>s</span>
  </div>
</header>

<div id="status-bar" class="status-bar has-unk" role="status" aria-live="polite">
  <div class="status-dot" aria-hidden="true"></div>
  <span id="status-text">Loading…</span>
  <span id="status-uptime"></span>
</div>

<main>
  <div id="error-bar" class="error-bar" hidden role="alert"></div>
  <div id="summary" class="summary" aria-label="Summary counts"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="Filter services…" autocomplete="off"
             aria-label="Filter services by name or target">
    </div>
    <div class="filter-pills" role="group" aria-label="Filter by status">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="up">Up</button>
      <button class="filter-pill" data-filter="down">Down</button>
      <button class="filter-pill" data-filter="degraded">Degraded</button>
    </div>
    <select id="sort-select" class="sort-select" aria-label="Sort order">
      <option value="status">Sort: Status</option>
      <option value="name">Sort: Name</option>
      <option value="latency">Sort: Latency</option>
    </select>
  </div>

  <div id="results-count" class="results-count" aria-live="polite"></div>
  <div id="grid" class="grid" role="list"></div>
</main>

<div id="sidebar-backdrop" class="sidebar-backdrop"></div>
<aside id="sidebar" class="sidebar"
       role="dialog" aria-modal="true" aria-labelledby="sidebar-svc-name">
  <div class="sidebar-head">
    <div class="sidebar-title-block">
      <div class="sidebar-icon-wrap" aria-hidden="true"><span id="sidebar-icon"></span></div>
      <div style="min-width:0">
        <div class="sidebar-name" id="sidebar-svc-name"></div>
        <div class="sidebar-target" id="sidebar-svc-target"></div>
      </div>
    </div>
    <div class="sidebar-head-right">
      <span id="sidebar-badge"></span>
      <button class="btn-close" id="btn-close-sidebar" aria-label="Close service detail">✕</button>
    </div>
  </div>

  <div class="svc-meta" id="svc-meta"></div>

  <div class="sidebar-body">
    <div class="section-label">Latency — last 50 checks</div>
    <div class="chart-wrap"><canvas id="latency-chart"></canvas></div>
    <div class="section-label">Check History</div>
    <div id="sidebar-content"></div>
  </div>
</aside>

<div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<script>
  // ── State ────────────────────────────────────────────────────────────────────
  let services        = [];
  let historyCache    = {};   // { [name]: { data: [], ts: number } }
  let selected        = null;
  let countdown       = 30;
  let refreshInterval = 30;   // seconds; 0 = paused
  let timer           = null;
  let tsTimer         = null; // ticks every 5s to update timeAgo labels in-place
  let chart           = null;
  let loaded          = false;
  let firstLoad       = true;
  let activeFilter    = 'all';
  let activeSort      = 'status';
  let prevFocusEl     = null;

  const TYPE_ICON   = { http: '🌐', tcp: '🔌', system: '💻' };
  const HISTORY_TTL = 25_000; // cache history for ~25s to avoid N fetches per refresh

  // ── Chart.js plugin: coloured status bands ───────────────────────────────────
  const statusBandPlugin = {
    id: 'statusBands',
    beforeDatasetsDraw(chart) {
      const rows = chart._statusRows;
      if (!rows || !rows.length) return;
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales.x) return;
      const { left, right, top, bottom } = chartArea;
      ctx.save();
      rows.forEach((r, i) => {
        if (r.status === 'up') return;
        const color = r.status === 'down'
          ? 'rgba(255,77,94,0.14)'
          : 'rgba(255,214,10,0.13)';
        const x0 = i === 0              ? left  : scales.x.getPixelForValue(i - 0.5);
        const x1 = i === rows.length - 1 ? right : scales.x.getPixelForValue(i + 0.5);
        ctx.fillStyle = color;
        ctx.fillRect(
          Math.max(left, x0), top,
          Math.min(right, x1) - Math.max(left, x0), bottom - top
        );
      });
      ctx.restore();
    },
  };
  Chart.register(statusBandPlugin);

  // ── Event wiring ─────────────────────────────────────────────────────────────
  document.getElementById('btn-close-sidebar').addEventListener('click', closeSidebar);
  document.getElementById('sidebar-backdrop').addEventListener('click', closeSidebar);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && selected) { closeSidebar(); return; }
    if (e.key === 'r' && !e.ctrlKey && !e.metaKey && !e.altKey
        && document.activeElement.tagName !== 'INPUT'
        && document.activeElement.tagName !== 'SELECT') {
      document.getElementById('btn-refresh').click();
    }
  });

  document.getElementById('btn-refresh').addEventListener('click', async () => {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('spinning');
    await loadServices();
    btn.classList.remove('spinning');
    if (refreshInterval > 0) resetTimer();
  });

  document.getElementById('search').addEventListener('input', renderGrid);

  document.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeFilter = pill.dataset.filter;
      renderGrid();
    });
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    activeSort = e.target.value;
    renderGrid();
  });

  document.querySelectorAll('.refresh-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.refresh-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      refreshInterval = parseInt(btn.dataset.interval, 10);
      resetTimer();
    });
  });

  // ── API ──────────────────────────────────────────────────────────────────────
  async function api(path, opts) {
    const res = await fetch(path, opts);
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    return res.json();
  }

  // ── Filter + sort ────────────────────────────────────────────────────────────
  function getFilteredSorted() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    let list = services.filter(s => {
      if (activeFilter !== 'all' && s.status !== activeFilter) return false;
      if (q && !s.name.toLowerCase().includes(q) && !s.target.toLowerCase().includes(q)) return false;
      return true;
    });
    if (activeSort === 'status') {
      const order = { down: 0, degraded: 1, unknown: 2, up: 3 };
      list.sort((a, b) => (order[a.status] ?? 4) - (order[b.status] ?? 4));
    } else if (activeSort === 'latency') {
      list.sort((a, b) => (a.latency_ms ?? Infinity) - (b.latency_ms ?? Infinity));
    } else {
      list.sort((a, b) => a.name.localeCompare(b.name));
    }
    return list;
  }

  // ── Load services ─────────────────────────────────────────────────────────────
  async function loadServices() {
    try {
      const fresh = await api('/services');
      // Invalidate cache for removed services
      const freshNames = new Set(fresh.map(s => s.name));
      Object.keys(historyCache).forEach(k => { if (!freshNames.has(k)) delete historyCache[k]; });
      services = fresh;
      loaded   = true;
      renderSummary();
      renderStatusBar();
      renderGrid();
      updateFavicon(services.some(s => s.status === 'down'));
      hideError();
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
      loadAllHistory();
    } catch (e) {
      loaded = true;
      showError('Cannot reach API — ' + e.message);
      renderGrid();
    }
  }

  async function loadAllHistory() {
    // Only re-fetch services whose cache has expired
    const stale = services.filter(svc => {
      const entry = historyCache[svc.name];
      return !entry || (Date.now() - entry.ts) > HISTORY_TTL;
    });
    if (!stale.length) return;
    await Promise.allSettled(stale.map(async svc => {
      try {
        const data = await api('/history?service=' + encodeURIComponent(svc.name) + '&limit=50');
        historyCache[svc.name] = { data, ts: Date.now() };
      } catch {
        historyCache[svc.name] = { data: [], ts: Date.now() };
      }
    }));
    renderGrid();
    renderStatusUptime();
  }

  // ── Summary cards ─────────────────────────────────────────────────────────────
  function renderSummary() {
    const c = counts();
    document.getElementById('summary').innerHTML = `
      <div class="stat-card">
        <div class="stat-val">${services.length}</div>
        <div class="stat-lbl">Services</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--up)">${c.up}</div>
        <div class="stat-lbl">Up</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--down)">${c.down}</div>
        <div class="stat-lbl">Down</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--deg)">${c.degraded}</div>
        <div class="stat-lbl">Degraded</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--unk)">${c.unknown}</div>
        <div class="stat-lbl">Unknown</div>
      </div>`;
  }

  function renderStatusBar() {
    const bar = document.getElementById('status-bar');
    const txt = document.getElementById('status-text');
    const c   = counts();
    bar.className = 'status-bar';
    if (!services.length) {
      bar.classList.add('has-unk'); txt.textContent = 'No services configured';
    } else if (c.down > 0) {
      bar.classList.add('has-down');
      txt.textContent = c.down === 1 ? '1 service is down' : `${c.down} services are down`;
    } else if (c.degraded > 0) {
      bar.classList.add('has-deg');
      txt.textContent = c.degraded === 1 ? '1 service is degraded' : `${c.degraded} services are degraded`;
    } else if (c.up === 0) {
      bar.classList.add('has-unk'); txt.textContent = 'Waiting for first check…';
    } else {
      bar.classList.add('all-good'); txt.textContent = 'All systems operational';
    }
  }

  // Accurate windowed uptime from the /uptime aggregate (non-DOWN ratio over
  // 24h), rather than the last 50 cached checks.
  async function renderStatusUptime() {
    try {
      const rows  = await api('/uptime?window=24h');
      const total = rows.reduce((a, r) => a + r.total_checks, 0);
      const up    = rows.reduce((a, r) => a + r.up_checks, 0);
      if (!total) return;
      const pct = ((up / total) * 100).toFixed(1);
      document.getElementById('status-uptime').textContent = `Overall uptime ${pct}% (24h)`;
    } catch { /* leave the previous value in place */ }
  }

  function counts() {
    const c = { up: 0, down: 0, degraded: 0, unknown: 0 };
    services.forEach(s => { c[s.status] = (c[s.status] || 0) + 1; });
    return c;
  }

  // ── Skeleton ──────────────────────────────────────────────────────────────────
  function skeletonCard() {
    return `<div class="skeleton-card" role="listitem" aria-hidden="true">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="skeleton sk-line" style="width:55%"></div>
        <div class="skeleton sk-line" style="width:18%;height:18px;border-radius:99px"></div>
      </div>
      <div class="skeleton sk-line" style="width:70%"></div>
      <div class="skeleton" style="height:34px;border-radius:4px"></div>
      <div style="display:flex;justify-content:space-between">
        <div class="skeleton sk-line" style="width:28%"></div>
        <div class="skeleton sk-line" style="width:22%"></div>
      </div>
      <div class="skeleton" style="height:20px;border-radius:2px"></div>
      <div><div class="skeleton" style="width:55%;height:28px;border-radius:6px"></div></div>
    </div>`;
  }

  // ── Grid ──────────────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid     = document.getElementById('grid');
    const countEl  = document.getElementById('results-count');

    if (!loaded) {
      grid.innerHTML = Array.from({ length: 6 }).map(skeletonCard).join('');
      countEl.textContent = '';
      return;
    }

    const list = getFilteredSorted();

    if (!services.length) {
      grid.innerHTML = `<div class="empty-state" role="listitem">
        <div class="empty-icon">📡</div>
        <div class="empty-title">No services configured</div>
        <div class="empty-desc">Add services to <code>services.yaml</code> to start monitoring.</div>
      </div>`;
      countEl.textContent = '';
      return;
    }

    // Results counter
    const isFiltered = activeFilter !== 'all' || document.getElementById('search').value.trim();
    countEl.innerHTML = isFiltered
      ? `Showing <strong>${list.length}</strong> of <strong>${services.length}</strong> service${services.length !== 1 ? 's' : ''}`
      : '';

    if (!list.length) {
      grid.innerHTML = `<div class="empty-state" role="listitem">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No services match</div>
        <div class="empty-desc">Try a different filter or search term.</div>
      </div>`;
      return;
    }

    const isFirst = firstLoad;
    firstLoad = false;

    grid.innerHTML = list.map((s, i) => {
      const entry  = historyCache[s.name];
      const rows   = entry?.data;
      const lat    = s.latency_ms != null
        ? `<span class="latency" style="color:${latColor(s.latency_ms)}">${Math.round(s.latency_ms)}<span class="latency-unit">ms</span></span>`
        : `<span class="latency-null">—</span>`;
      const ago    = s.last_checked ? timeAgo(s.last_checked) : 'never';
      const spark  = rows ? sparkline(rows) : '<span class="spark-empty">loading…</span>';
      const blocks = rows ? uptimeBlocks(rows) : '';
      const stats  = rows ? calcStats(rows) : null;
      const uptime = rows ? calcUptime(rows) : null;

      const statsRow = stats ? `
        <div class="card-stats">
          <div class="stat-seg">min <b style="color:var(--up)">${stats.min}ms</b></div>
          <div class="stat-seg">avg <b>${stats.avg}ms</b></div>
          <div class="stat-seg">max <b style="color:${latColor(stats.maxRaw)}">${stats.max}ms</b></div>
        </div>` : '';

      const uptimeLbl = uptime && rows
        ? `<div class="uptime-label">${uptime} uptime · last ${Math.min(rows.length, 50)} checks</div>` : '';

      const animStyle = isFirst ? `style="animation-delay:${(i * 0.04).toFixed(2)}s"` : '';

      return `
        <div class="card ${selected === s.name ? 'active' : ''} ${isFirst ? 'is-new' : ''}"
             role="listitem" tabindex="0"
             aria-label="Service ${esc(s.name)}, status ${s.status}"
             data-name="${esc(s.name)}" data-status="${s.status}" ${animStyle}>
          <div class="card-top">
            <div class="card-name-row">
              <span class="svc-icon" aria-hidden="true">${TYPE_ICON[s.type] || '📡'}</span>
              <span class="card-name ${s.status === 'down' ? 'pulse' : ''}">${esc(s.name)}</span>
            </div>
            <span class="badge badge-${s.status}">${s.status}</span>
          </div>
          <div class="card-target"><span class="chip">${s.type}</span>${esc(s.target)}${s.port ? ':' + s.port : ''}</div>
          <div class="sparkline-wrap" aria-hidden="true">${spark}</div>
          <div class="card-mid">
            ${lat}
            <div class="card-time">
              <span data-checked-at="${esc(s.last_checked || '')}">${ago}</span><br>
              <span style="font-size:10px">every ${s.interval}s</span>
            </div>
          </div>
          ${statsRow}
          ${blocks}
          ${uptimeLbl}
          <div class="card-actions">
            <button class="btn-primary btn-check" aria-label="Run check for ${esc(s.name)} now">Check now</button>
          </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('.card').forEach(card => {
      const name = card.dataset.name;
      const svc  = services.find(s => s.name === name);
      // Click anywhere on card (except buttons) opens detail
      card.addEventListener('click', e => {
        if (!e.target.closest('button')) selectSvc(name);
      });
      // Keyboard: Enter / Space to open detail
      card.addEventListener('keydown', e => {
        if ((e.key === 'Enter' || e.key === ' ') && !e.target.closest('button')) {
          e.preventDefault();
          selectSvc(name);
        }
      });
      card.querySelector('.btn-check').addEventListener('click', e => {
        e.stopPropagation();
        runCheck(svc);
      });
    });
  }

  // ── Sparkline ─────────────────────────────────────────────────────────────────
  function sparkline(rows) {
    const pts = [...rows].slice(0, 10).reverse().map(r => r.latency_ms).filter(v => v != null);
    if (pts.length < 2) return '<span class="spark-empty">no data yet</span>';
    const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 1;
    const W = 100, H = 32, P = 3;
    const coords = pts.map((v, i) => {
      const x = P + (i / (pts.length - 1)) * (W - 2 * P);
      const y = H - P - ((v - mn) / rng) * (H - 2 * P);
      return [x.toFixed(1), y.toFixed(1)];
    });
    const line = coords.map(([x, y]) => `${x},${y}`).join(' ');
    const fill = [`${P},${H}`, ...coords.map(([x, y]) => `${x},${y}`), `${W - P},${H}`].join(' ');
    const color = latColor(pts[pts.length - 1]);
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" aria-hidden="true" style="overflow:visible">
      <polygon points="${fill}" fill="${color}" opacity="0.1"/>
      <polyline points="${line}" fill="none" stroke="${color}" stroke-width="1.8"
        stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  }

  // ── Uptime blocks (StatusPage-style) ─────────────────────────────────────────
  function uptimeBlocks(rows) {
    if (!rows || !rows.length) return '';
    const checks = [...rows].slice(0, 50).reverse();
    const blocks = checks.map(r => {
      const color = r.status === 'up'       ? 'var(--up)'
                  : r.status === 'down'     ? 'var(--down)'
                  : r.status === 'degraded' ? 'var(--deg)'
                  : 'var(--unk)';
      const ts = r.checked_at ? fmtFull(r.checked_at) : 'unknown time';
      return `<span class="uptime-block" style="background:${color}"
                    title="${esc(r.status)} — ${esc(ts)}" aria-hidden="true"></span>`;
    }).join('');
    return `<div class="uptime-blocks" aria-label="Last ${checks.length} check results timeline">${blocks}</div>`;
  }

  // ── Stats ─────────────────────────────────────────────────────────────────────
  function calcUptime(rows) {
    if (!rows.length) return null;
    const up = rows.filter(r => r.status === 'up').length;
    return ((up / rows.length) * 100).toFixed(1) + '%';
  }

  function calcStats(rows) {
    const vals = rows.map(r => r.latency_ms).filter(v => v != null);
    if (!vals.length) return null;
    const mn  = Math.min(...vals), mx = Math.max(...vals);
    const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
    return { min: Math.round(mn), max: Math.round(mx), maxRaw: mx, avg: Math.round(avg) };
  }

  function latColor(ms) {
    if (ms == null) return 'var(--unk)';
    if (ms < 200)   return '#2bd576';
    if (ms < 1000)  return '#ffd60a';
    return '#ff4d5e';
  }

  // ── Favicon ───────────────────────────────────────────────────────────────────
  function updateFavicon(hasDown) {
    try {
      const c = document.createElement('canvas');
      c.width = 32; c.height = 32;
      const ctx = c.getContext('2d');
      ctx.beginPath(); ctx.arc(16, 16, 15, 0, Math.PI * 2);
      ctx.fillStyle = hasDown ? '#350a12' : '#06291a'; ctx.fill();
      ctx.beginPath(); ctx.arc(16, 16, 14, 0, Math.PI * 2);
      ctx.strokeStyle = hasDown ? '#ff4d5e' : '#2bd576'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = hasDown ? '#ff4d5e' : '#2bd576';
      ctx.font = 'bold 17px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(hasDown ? '!' : '✓', 16, 17);
      let link = document.querySelector("link[rel~='icon']");
      if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
      link.href = c.toDataURL();
    } catch { /* canvas blocked */ }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const wrap  = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = msg;
    wrap.appendChild(toast);
    requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 350);
    }, 3500);
  }

  // ── Manual check ──────────────────────────────────────────────────────────────
  async function runCheck(svc) {
    const card = document.querySelector(`.card[data-name="${CSS.escape(svc.name)}"]`);
    const btn  = card && card.querySelector('.btn-check');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Checking…'; }
    try {
      const body = { name: svc.name, type: svc.type, target: svc.target };
      if (svc.port) body.port = svc.port;
      const result = await api('/checks/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const latStr = result.latency_ms != null ? ` — ${Math.round(result.latency_ms)}ms` : '';
      showToast(
        `${svc.name} checked${latStr} · ${result.status.toUpperCase()}`,
        result.status === 'up' ? 'success' : result.status === 'down' ? 'error' : 'info'
      );
      // Bust cache so the card refreshes with fresh history
      delete historyCache[svc.name];
    } catch (e) {
      showError('Check failed: ' + e.message);
      showToast('Check failed: ' + e.message, 'error');
    } finally {
      await loadServices();
      if (selected === svc.name) await loadHistory(svc.name);
    }
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────────
  async function selectSvc(name) {
    prevFocusEl = document.activeElement;
    selected    = name;
    const svc   = services.find(s => s.name === name);
    renderGrid();

    document.getElementById('sidebar-icon').textContent      = TYPE_ICON[svc?.type] || '📡';
    document.getElementById('sidebar-svc-name').textContent  = name;
    document.getElementById('sidebar-svc-target').textContent =
      (svc?.target || '') + (svc?.port ? ':' + svc.port : '');
    document.getElementById('sidebar-badge').innerHTML =
      `<span class="badge badge-${svc?.status || 'unknown'}">${svc?.status || 'unknown'}</span>`;

    document.getElementById('svc-meta').innerHTML = `
      <div class="svc-meta-item">
        <div class="svc-meta-label">Type</div>
        <div class="svc-meta-val">${(svc?.type || '—').toUpperCase()}</div>
      </div>
      <div class="svc-meta-item">
        <div class="svc-meta-label">Interval</div>
        <div class="svc-meta-val">every ${svc?.interval || '—'}s</div>
      </div>
      <div class="svc-meta-item">
        <div class="svc-meta-label">Last check</div>
        <div class="svc-meta-val">${svc?.last_checked ? timeAgo(svc.last_checked) : 'never'}</div>
      </div>
      ${svc?.port ? `<div class="svc-meta-item"><div class="svc-meta-label">Port</div><div class="svc-meta-val">${svc.port}</div></div>` : ''}`;

    const sidebar = document.getElementById('sidebar');
    document.getElementById('sidebar-backdrop').classList.add('open');
    sidebar.classList.add('open');
    document.body.style.overflow = 'hidden';

    // Move focus into sidebar and enable focus trap
    setTimeout(() => document.getElementById('btn-close-sidebar').focus(), 50);
    enableFocusTrap(sidebar);

    await loadHistory(name);
  }

  function enableFocusTrap(el) {
    if (el._trapHandler) el.removeEventListener('keydown', el._trapHandler);
    el._trapHandler = e => {
      if (e.key !== 'Tab') return;
      const focusable = [...el.querySelectorAll(
        'button:not([disabled]), [href], input, select, [tabindex]:not([tabindex="-1"])'
      )];
      if (!focusable.length) { e.preventDefault(); return; }
      const first = focusable[0], last = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { last.focus(); e.preventDefault(); }
      } else {
        if (document.activeElement === last) { first.focus(); e.preventDefault(); }
      }
    };
    el.addEventListener('keydown', el._trapHandler);
  }

  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (sidebar._trapHandler) {
      sidebar.removeEventListener('keydown', sidebar._trapHandler);
      delete sidebar._trapHandler;
    }
    selected = null;
    document.getElementById('sidebar-backdrop').classList.remove('open');
    sidebar.classList.remove('open');
    document.body.style.overflow = '';
    destroyChart();
    renderGrid();
    if (prevFocusEl?.focus) { setTimeout(() => prevFocusEl.focus(), 50); prevFocusEl = null; }
  }

  // ── History ───────────────────────────────────────────────────────────────────
  async function loadHistory(name) {
    const body = document.getElementById('sidebar-content');
    body.innerHTML = '<p class="empty">Loading…</p>';
    try {
      const rows = await api('/history?service=' + encodeURIComponent(name) + '&limit=50');
      historyCache[name] = { data: rows, ts: Date.now() };
      renderGrid();
      if (!rows.length) {
        destroyChart();
        body.innerHTML = '<p class="empty">No history yet — click "Check now" to run the first check.</p>';
        return;
      }
      renderChart(rows);
      renderTable(rows, body);
    } catch {
      body.innerHTML = '<p class="empty">Failed to load history.</p>';
    }
  }

  // ── Chart ─────────────────────────────────────────────────────────────────────
  function renderChart(rows) {
    const ordered = [...rows].reverse();
    const labels  = ordered.map(r => r.checked_at ? fmtShort(r.checked_at) : '');
    const data    = ordered.map(r => r.latency_ms ?? null);
    const colors  = ordered.map(r => latColor(r.latency_ms));

    destroyChart();
    const ctx = document.getElementById('latency-chart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Latency (ms)',
          data,
          borderColor: '#b46bff',
          backgroundColor: 'rgba(180,107,255,0.1)',
          pointBackgroundColor: colors,
          pointBorderColor: colors,
          pointRadius: 4,
          pointHoverRadius: 7,
          borderWidth: 2,
          fill: true,
          tension: 0.35,
          spanGaps: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#101017', borderColor: '#29293a', borderWidth: 1,
            titleColor: '#7d7d95', bodyColor: '#e9e9f2', padding: 10,
            callbacks: {
              label: ctx => {
                const row = ordered[ctx.dataIndex];
                const ms  = ctx.parsed.y != null ? ctx.parsed.y.toFixed(1) + ' ms' : 'no data';
                return `${ms} · ${row?.status || '—'}`;
              },
            },
          },
        },
        scales: {
          x: {
            ticks: { color: '#7d7d95', maxTicksLimit: 8, maxRotation: 0, font: { size: 11 } },
            grid:  { color: '#181823' },
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#7d7d95', callback: v => v + ' ms', font: { size: 11 } },
            grid:  { color: '#29293a' },
          },
        },
      },
    });
    // Attach row data for the status band plugin, then redraw
    chart._statusRows = ordered;
    chart.update('none');
  }

  function renderTable(rows, container) {
    const tableRows = rows.map((r, i) => {
      const prev    = rows[i + 1];
      const changed = prev && prev.status !== r.status;
      return `<tr>
        <td style="color:var(--muted);white-space:nowrap;font-size:12px">${r.checked_at ? fmtFull(r.checked_at) : '—'}</td>
        <td>
          <span class="badge badge-${r.status}">${r.status}</span>
          ${changed ? '<span class="changed-tag">changed</span>' : ''}
        </td>
        <td style="color:${latColor(r.latency_ms)};font-weight:600">${r.latency_ms != null ? r.latency_ms.toFixed(1) + ' ms' : '—'}</td>
        <td style="color:var(--muted);font-size:12px">${esc(r.detail || '—')}</td>
      </tr>`;
    }).join('');

    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Time</th><th>Status</th><th>Latency</th><th>Detail</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>`;
  }

  function destroyChart() { if (chart) { chart.destroy(); chart = null; } }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function toDate(iso) {
    if (!iso) return null;
    return new Date(/[Zz]|[+-]\d{2}:\d{2}$/.test(iso) ? iso : iso + 'Z');
  }

  function timeAgo(iso) {
    const d = toDate(iso);
    if (!d) return 'never';
    const s = Math.floor((Date.now() - d) / 1000);
    if (s < 5)    return 'just now';
    if (s < 60)   return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    return Math.floor(s / 3600) + 'h ago';
  }

  function fmtShort(iso) {
    return toDate(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function fmtFull(iso) {
    const d = toDate(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showError(msg) {
    const el = document.getElementById('error-bar');
    el.innerHTML = '⚠ ' + esc(msg); el.hidden = false;
  }
  function hideError() { document.getElementById('error-bar').hidden = true; }

  // ── Real-time timestamp ticker ─────────────────────────────────────────────────
  // Updates the "Xs ago" labels in-place without a full re-render
  function startTsTicker() {
    clearInterval(tsTimer);
    tsTimer = setInterval(() => {
      document.querySelectorAll('[data-checked-at]').forEach(el => {
        const iso = el.dataset.checkedAt;
        if (iso) el.textContent = timeAgo(iso);
      });
    }, 5000);
  }

  // ── Auto-refresh timer ────────────────────────────────────────────────────────
  function resetTimer() {
    clearInterval(timer);
    const pill = document.getElementById('countdown-pill');

    if (refreshInterval === 0) {
      pill.innerHTML = '⏸ paused';
      return;
    }

    countdown = refreshInterval;
    pill.innerHTML = `↻ <span id="countdown">${countdown}</span>s`;

    timer = setInterval(async () => {
      countdown--;
      const el = document.getElementById('countdown');
      if (el) el.textContent = countdown;
      if (countdown <= 0) {
        countdown = refreshInterval;
        await loadServices();
        if (selected) await loadHistory(selected);
        const el2 = document.getElementById('countdown');
        if (el2) el2.textContent = countdown;
      }
    }, 1000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  renderGrid();    // show skeletons immediately
  loadServices();
  resetTimer();
  startTsTicker();
</script>
</body>
</html>
